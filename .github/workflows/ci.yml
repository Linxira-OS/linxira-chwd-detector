name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo build --release --locked
      - run: |
          ./target/release/linxira-chwd-detector > report.json
          python -c 'import json; d=json.load(open("report.json")); assert d["schema_version"] == 1'
      - run: |
          if ./target/release/linxira-chwd-detector /tmp; then
            exit 1
          else
            test $? -eq 2
          fi
